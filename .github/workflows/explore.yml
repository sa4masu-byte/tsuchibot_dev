name: explore

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Exploration mode
        type: choice
        required: true
        default: incremental
        options: [incremental, full, retry_failed]
      target_run_id:
        description: Required for retry_failed
        type: string
        required: false
      public_run_id:
        description: Public run identifier created by the API
        type: string
        required: false
      source_mode:
        description: Use disabled for a no-network workflow diagnostic
        type: choice
        required: true
        default: live
        options: [live, disabled]

concurrency:
  group: tsuchibot-exploration
  cancel-in-progress: false

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Validate retry target
        if: inputs.mode == 'retry_failed' && inputs.target_run_id == ''
        run: exit 1
      - name: Apply database migrations
        if: inputs.source_mode == 'live'
        env:
          TSUCHIBOT_DATABASE_URL: ${{ secrets.TSUCHIBOT_DATABASE_URL }}
        run: python scripts/migrate.py apply
      - name: Run exploration worker
        env:
          TSUCHIBOT_DATABASE_URL: ${{ secrets.TSUCHIBOT_DATABASE_URL }}
          TSUCHIBOT_GEMINI_API_KEY: ${{ secrets.TSUCHIBOT_GEMINI_API_KEY }}
          EXPLORATION_MODE: ${{ inputs.mode }}
          TARGET_RUN_ID: ${{ inputs.target_run_id }}
          SOURCE_MODE: ${{ inputs.source_mode }}
        run: |
          args=(explore --mode "$EXPLORATION_MODE" --source-mode "$SOURCE_MODE")
          if [[ -n "$TARGET_RUN_ID" ]]; then
            args+=(--target-run-id "$TARGET_RUN_ID")
          fi
          python -m worker.cli "${args[@]}"
